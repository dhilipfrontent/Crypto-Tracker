<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Nova Crypto | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Inter', sans-serif; }
        
        /* Galaxy Background Setup */
        #video-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }
        #bg-video {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }

        .glow-text { text-shadow: 0 0 20px rgba(56, 189, 248, 0.8); }
        
        /* Blue theme-ku eatha maadhiri bull icon color maatha */
        .bull-icon {
            width: 24px;
            height: 24px;
            filter: invert(68%) sepia(50%) saturate(2800%) hue-rotate(170deg) brightness(105%) contrast(100%);
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video autoplay loop muted playsinline id="bg-video">
            <source src="assets/galaxy-video.mp4.mp4" type="video/mp4">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-stars-in-space-background-1610-large.mp4" type="video/mp4">
        </video>
    </div>
    
    <div class="relative z-20 flex flex-col items-center justify-center h-screen text-center px-6">
        
        <h1 id="title" class="text-3xl md:text-5xl font-black italic tracking-tighter mb-4 glow-text text-white uppercase">
            NovaCrypto <button onclick="startRoute()" id="start-btn" 
                class="w-full md:w-auto px-0 py-5 border-1000 border-sky-1000 text-sky-500 rounded-full font-black uppercase tracking-widest hover:bg-sky-1000 hover:text-white transition-all duration-1000 transform hover:scale-300">
            <span class="flex items-center justify-center gap-3">
                <img src="assets/rising.png.png" class="bull-icon" alt="bull">
        </h1>

        <div class="my-6">
            <img id="btc-hero" src="assets/pngwing.com.png" class="w-36 h-36 md:w-56 md:h-56 mx-auto" 
                 style="filter: drop-shadow(0 0 40px #f1c40f);" alt="bitcoin">
        </div>

        <div id="description" class="max-w-xl mb-12 mx-auto">
            <h2 class="text-lg md:text-2xl font-light text-sky-100 leading-relaxed opacity-80">
                Experience the next generation of <span class="font-bold text-sky-400">Live Market Analytics</span>. 
                Real-time OHLC data at your fingertips.
            </h2>
        </div>

        <button onclick="startRoute()" id="start-btn" 
                class="w-full md:w-auto px-10 py-4 border-2 border-sky-500 text-sky-400 rounded-full font-black uppercase tracking-widest hover:bg-sky-500 hover:text-white transition-all duration-500 transform hover:scale-105">
            <span class="flex items-center justify-center gap-3">
                <img src="assets/share mar.png.png" class="bull-icon" alt="bull">
                
                <span>Coin Snap</span>
                
                <img src="assets/share mar.png.png" class="bull-icon" style="transform: scaleX(-1);" alt="bull">
            </span>
        </button>
    </div>

    <script>
        gsap.to("#btc-hero", { y: -30, duration: 2.5, repeat: -1, yoyo: true, ease: "power1.inOut" });

        function startRoute() {
            const tl = gsap.timeline();
            tl.to("#title,#description,#start-btn", { opacity: 0, y: 50, duration: 0.8, stagger: 0.1 });
            tl.to("#btc-hero", {
                scale: 60,
                rotation: 360,
                duration: 1.2,
                ease: "power2.in",
                onComplete: () => { 
                    window.location.href = "trader-dashboard.html"; 
                }
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Crypto Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.0.1/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.2.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.1/dist/chartjs-chart-financial.min.js"></script>
    
    <style>
        body { 
            /* First photo-la irukkura madhiri soft-ana Blue-to-Black gradient background */
            background: radial-gradient(circle at top, #1e3a8a 0%, #030712 60%); 
            color: #e2e8f0; font-family: 'Inter', sans-serif;
            min-height: 100vh; margin: 0;
        }
        .terminal-card {
            background: rgba(15, 23, 42, 0.6); /* Konjam translucent look */
            backdrop-filter: blur(8px); /* Frosted glass effect */
            border: 1px solid rgba(56, 189, 248, 0.2); /* Subtle glow border */
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.5);
        }
        .glow-text {
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.6);
        }
    </style>
</head>
<body class="p-6 md:p-10">

    <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <h1 class="text-3xl font-black tracking-widest text-sky-400 glow-text uppercase">BitVision </h1>
        <div class="text-center md:text-right mt-4 md:mt-0">
            <p class="text-sm text-gray-400">Network Status</p>
            <p class="text-green-400 font-bold animate-pulse">LIVE & SECURE</p>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="terminal-card p-6">
            <p class="text-xs text-gray-400 font-bold uppercase mb-2">Bitcoin Index (BTC/USD)</p>
            <h2 class="text-3xl font-bold text-white tracking-tight">$71,399</h2>
            <p class="text-sm mt-1 text-green-400 font-medium">▲ 2.72% (24h)</p>
        </div>
        <div class="terminal-card p-6 border-l-4 border-l-sky-500">
            <p class="text-xs text-gray-400 font-bold uppercase mb-2">Market Capitalization</p>
            <h2 class="text-2xl font-bold text-white">$1.43 T</h2>
        </div>
        <div class="terminal-card p-6 border-l-4 border-l-sky-500">
            <p class="text-xs text-gray-400 font-bold uppercase mb-2">Global 24h Volume</p>
            <h2 class="text-2xl font-bold text-white">$48.07 B</h2>
        </div>
    </div>

    <div class="terminal-card p-6">
        <div class="flex items-center mb-6">
            <span class="w-3 h-3 bg-red-500 rounded-full mr-2 animate-pulse"></span>
            <p class="text-xs font-bold text-sky-400 uppercase tracking-widest">Live Market Trajectory (OHLC Candles)</p>
        </div>
        <div class="relative h-[300px] md:h-[500px]">
            <canvas id="candleChart"></canvas>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('candleChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'candlestick',
            data: {
                datasets: [{
                    label: 'BTC/USD Candle Feed',
                    data: [], // OHLC data will be inserted here
                    // Red/Green colors just like the second image
                    color: { up: '#10b981', down: '#f43f5e', unchanged: '#848e9c' },
                    borderColor: { up: '#10b981', down: '#f43f5e', unchanged: '#848e9c' }
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { 
                        grid: { color: 'rgba(255,255,255,0.04)' },
                        ticks: { color: '#64748b' }
                    },
                    y: { 
                        grid: { color: 'rgba(255,255,255,0.04)' },
                        ticks: { color: '#64748b' },
                        position: 'right' // Y-axis on the right as in trading terminals
                    }
                }
            }
        });

        async function fetchMarketData() {
            try {
                // Fetching OHLC (Open, High, Low, Close) data for the last day
                const response = await fetch('https://api.coingecko.com/api/v3/coins/bitcoin/ohlc?vs_currency=usd&days=1');
                const ohlcData = await response.json();
                
                // Formating data for Chart.js financial plugin
                const formatted = ohlcData.map(item => ({
                    x: item[0], // Timestamp
                    o: item[1], // Open
                    h: item[2], // High
                    l: item[3], // Low
                    c: item[4]  // Close
                })).slice(-18); // Showing last 18 candles for better view

                chart.data.datasets[0].data = formatted;
                chart.update();
            } catch (error) { 
                console.error("API feed error, retrying...", error); 
            }
        }

        // Fetching data and updating every 60 seconds (market updates)
        setInterval(fetchMarketData, 60000);
        fetchMarketData();
    </script>
</body>
</html>
